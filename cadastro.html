        <div class="login-box cadastro-box">

            <h1>Cadastro</h1>
            
            <form>
                <label>Usuário</label>
                <input type="text" placeholder="Digite o nome" required>

                <label>Email</label>
                <input type="email" placeholder="Digite o email" required>

                <label>Senha</label>
                <input type="password" placeholder="Escolha a senha" required>

                <label>Repita a senha</label>
                <input type="password" placeholder="Confirme sua senha" required>
                <button type="submit" class="btn-cadastrar">Criar</button>
            </form>
